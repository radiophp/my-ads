name: CI

on:
  push:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect UI changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui:
              - 'ui/**'

  server-lint:
    if: ${{ true }} # re-enabled
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm install

      - name: Run lint
        working-directory: server
        run: ESLINT_USE_FLAT_CONFIG=false npm run lint

  server-typecheck:
    if: ${{ true }} # re-enabled
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm install

      - name: Type check
        working-directory: server
        run: npm run typecheck

  server-test:
    if: ${{ true }} # re-enabled
    runs-on: ubuntu-latest
    needs:
      - server-lint
      - server-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 6201:5432
        env:
          POSTGRES_DB: my_ads
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6202:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:6201/my_ads?schema=public
      DATABASE_DIRECT_URL: postgresql://postgres:postgres@localhost:6201/my_ads?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6202
      JWT_ACCESS_TOKEN_SECRET: github-access-secret
      JWT_REFRESH_TOKEN_SECRET: github-refresh-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm install

      - name: Generate Prisma Client
        working-directory: server
        run: npm run prisma:generate

      - name: Apply database schema
        working-directory: server
        run: npx prisma migrate deploy

      - name: Run unit tests
        working-directory: server
        run: npm test -- --runInBand

      - name: Run e2e tests
        working-directory: server
        run: npm run test:e2e

  server-build:
    if: ${{ true }} # re-enabled
    runs-on: ubuntu-latest
    needs: server-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm install

      - name: Build
        working-directory: server
        run: npm run build

  ui-lint:
    if: ${{ true }} # re-enabled
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

  ui-typecheck:
    if: ${{ true }} # re-enabled
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

  ui-test:
    if: ${{ true }} # re-enabled
    runs-on: ubuntu-latest
    needs:
      - ui-lint
      - ui-typecheck
    env:
      NEXT_UI_PORT: 6005
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test -- --run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: ${{ false }}
        run: npm run test:e2e -- --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:6005
          NEXT_UI_PORT: 6005

  ui-build:
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    needs:
      - changes
      - ui-test
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  build-api-image:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on:
      - self-hosted
      - linux
      - x64
    needs:
      - server-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build API image
        run: |
          docker build \
            -t my-ads-api:latest \
            --build-arg NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://mahanfile.com' }} \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://mahanfile.com/api' }} \
            -f server/Dockerfile server

  build-backup-image:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on:
      - self-hosted
      - linux
      - x64
    needs:
      - server-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build backup image
        run: |
          docker build \
            -t my-ads-backup:latest \
            -f backup/Dockerfile backup

  build-ui-image:
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' && github.base_ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository)
      )
    runs-on:
      - self-hosted
      - linux
      - x64
    needs:
      - ui-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build UI image
        run: |
          docker build \
            -t my-ads-ui:latest \
            --build-arg NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://mahanfile.com' }} \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://mahanfile.com/api' }} \
            --build-arg NEXT_PUBLIC_WS_BASE_URL=${{ vars.NEXT_PUBLIC_WS_BASE_URL || 'wss://mahanfile.com/socket.io' }} \
            --build-arg NEXT_PUBLIC_MAP_TILE_BASE_URL=${{ vars.NEXT_PUBLIC_MAP_TILE_BASE_URL || '/map' }} \
            --build-arg NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY || vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }} \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }} \
            -f ui/Dockerfile ui

  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
    needs:
      - build-api-image
      - build-backup-image
      - build-ui-image
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' && github.base_ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository)
      ) &&
      (needs.build-api-image.result == 'success' || needs.build-api-image.result == 'skipped') &&
      (needs.build-backup-image.result == 'success' || needs.build-backup-image.result == 'skipped') &&
      (needs.build-ui-image.result == 'success')
    permissions:
      contents: read
    env:
      STACK_NAME: ${{ vars.DEPLOY_STACK_NAME || 'my-ads' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment configuration
        env:
          STACK_NAME: ${{ env.STACK_NAME }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          JWT_ACCESS_TOKEN_SECRET: ${{ secrets.JWT_ACCESS_TOKEN_SECRET }}
          JWT_REFRESH_TOKEN_SECRET: ${{ secrets.JWT_REFRESH_TOKEN_SECRET }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_ADMIN_USER: ${{ vars.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_EMAIL: ${{ vars.GRAFANA_ADMIN_EMAIL }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || vars.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || vars.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT || vars.VAPID_SUBJECT }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY || vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          PUSH_NOTIFICATION_TIMEOUT_MS: ${{ vars.PUSH_NOTIFICATION_TIMEOUT_MS || secrets.PUSH_NOTIFICATION_TIMEOUT_MS }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://mahanfile.com' }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://mahanfile.com/api' }}
          BALE_BOT_USERNAME: ${{ vars.BALE_BOT_USERNAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          required_vars=(STACK_NAME POSTGRES_PASSWORD MINIO_ACCESS_KEY MINIO_SECRET_KEY JWT_ACCESS_TOKEN_SECRET JWT_REFRESH_TOKEN_SECRET RABBITMQ_PASSWORD TELEGRAM_BOT_TOKEN GRAFANA_ADMIN_PASSWORD GRAFANA_ADMIN_USER GRAFANA_ADMIN_EMAIL VAPID_PUBLIC_KEY VAPID_PRIVATE_KEY VAPID_SUBJECT NEXT_PUBLIC_VAPID_PUBLIC_KEY PUSH_NOTIFICATION_TIMEOUT_MS NEXT_PUBLIC_APP_URL NEXT_PUBLIC_API_BASE_URL BALE_BOT_USERNAME CLOUDFLARE_API_TOKEN NEXT_PUBLIC_TURNSTILE_SITE_KEY TURNSTILE_SECRET_KEY)
          missing=0
          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required deployment setting: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Verify Docker connectivity
        run: docker info

      - name: Deploy stack
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          JWT_ACCESS_TOKEN_SECRET: ${{ secrets.JWT_ACCESS_TOKEN_SECRET }}
          JWT_REFRESH_TOKEN_SECRET: ${{ secrets.JWT_REFRESH_TOKEN_SECRET }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          BALE_BOT_USERNAME: ${{ vars.BALE_BOT_USERNAME || 'mahanfile_bot' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          TELEGRAM_BOT_AUTOSTART: ${{ vars.TELEGRAM_BOT_AUTOSTART || 'false' }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_ADMIN_USER: ${{ vars.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_EMAIL: ${{ vars.GRAFANA_ADMIN_EMAIL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL || secrets.DATABASE_URL }}
          # Let compose defaults handle DIRECT_URL unless you need a separate endpoint
          NEXT_PUBLIC_ANALYTICS_WRITE_KEY: ${{ secrets.NEXT_PUBLIC_ANALYTICS_WRITE_KEY }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || vars.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || vars.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT || vars.VAPID_SUBJECT }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY || vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          PUSH_NOTIFICATION_TIMEOUT_MS: ${{ vars.PUSH_NOTIFICATION_TIMEOUT_MS || secrets.PUSH_NOTIFICATION_TIMEOUT_MS }}
          APP_PORT: ${{ vars.APP_PORT }}
          APP_GLOBAL_PREFIX: ${{ vars.APP_GLOBAL_PREFIX }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_INTERNAL_PORT: ${{ vars.POSTGRES_INTERNAL_PORT || '5432' }}
          POSTGRES_PUBLISHED_PORT: ${{ vars.POSTGRES_PORT }}
          REDIS_HOST: ${{ vars.REDIS_HOST }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          REDIS_DB: ${{ vars.REDIS_DB }}
          REDIS_TLS: ${{ vars.REDIS_TLS }}
          REDIS_KEY_PREFIX: ${{ vars.REDIS_KEY_PREFIX }}
          RABBITMQ_HOST: ${{ vars.RABBITMQ_HOST }}
          RABBITMQ_PORT: ${{ vars.RABBITMQ_PORT }}
          RABBITMQ_MANAGEMENT_PORT: ${{ vars.RABBITMQ_MANAGEMENT_PORT }}
          RABBITMQ_USERNAME: ${{ vars.RABBITMQ_USERNAME }}
          RABBITMQ_QUEUE_PREFIX: ${{ vars.RABBITMQ_QUEUE_PREFIX }}
          RABBITMQ_PREFETCH: ${{ vars.RABBITMQ_PREFETCH }}
          RABBITMQ_HEARTBEAT: ${{ vars.RABBITMQ_HEARTBEAT }}
          RABBITMQ_RECONNECT_SECONDS: ${{ vars.RABBITMQ_RECONNECT_SECONDS }}
          MINIO_ENDPOINT: ${{ vars.MINIO_ENDPOINT }}
          MINIO_PORT: ${{ vars.MINIO_PORT }}
          MINIO_CONSOLE_PORT: ${{ vars.MINIO_CONSOLE_PORT }}
          MINIO_USE_SSL: ${{ vars.MINIO_USE_SSL }}
          MINIO_BUCKET: ${{ vars.MINIO_BUCKET }}
          MINIO_REGION: ${{ vars.MINIO_REGION }}
          MINIO_PUBLIC_ENDPOINT: ${{ vars.MINIO_PUBLIC_ENDPOINT }}
          MINIO_PUBLIC_PORT: ${{ vars.MINIO_PUBLIC_PORT }}
          MINIO_PUBLIC_USE_SSL: ${{ vars.MINIO_PUBLIC_USE_SSL }}
          BACKUP_TZ: ${{ vars.BACKUP_TZ || 'Asia/Tehran' }}
          BACKUP_CRON: ${{ vars.BACKUP_CRON || '0 2 * * *' }}
          BACKUP_TELEGRAM_PHONES: ${{ vars.BACKUP_TELEGRAM_PHONES || '+989038923989,+989195043739' }}
          PGBACKREST_STANZA: ${{ vars.PGBACKREST_STANZA || 'my-ads' }}
          PGBACKREST_REPO1_S3_VERIFY_TLS: ${{ vars.PGBACKREST_REPO1_S3_VERIFY_TLS || 'n' }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          RATE_LIMIT_TTL: ${{ vars.RATE_LIMIT_TTL }}
          RATE_LIMIT_MAX: ${{ vars.RATE_LIMIT_MAX }}
          OTP_TTL_SECONDS: ${{ vars.OTP_TTL_SECONDS }}
          OTP_DIGITS: ${{ vars.OTP_DIGITS }}
          RABBITMQ_URL: ${{ vars.RABBITMQ_URL }}
          JWT_ACCESS_TOKEN_TTL: ${{ vars.JWT_ACCESS_TOKEN_TTL }}
          JWT_REFRESH_TOKEN_TTL: ${{ vars.JWT_REFRESH_TOKEN_TTL }}
          OTEL_ENABLED: ${{ vars.OTEL_ENABLED }}
          OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_LOG_LEVEL: ${{ vars.OTEL_LOG_LEVEL }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          LOG_PRETTY: ${{ vars.LOG_PRETTY }}
          PRISMA_LOG_QUERIES: ${{ vars.PRISMA_LOG_QUERIES }}
          NEXT_UI_PORT: ${{ vars.NEXT_UI_PORT }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://mahanfile.com' }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://mahanfile.com/api' }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          TELEGRAM_BOT_REPLICAS: ${{ vars.TELEGRAM_BOT_REPLICAS || '1' }}
          API_REPLICAS: ${{ vars.API_REPLICAS }}
          API_CRON_REPLICAS: ${{ vars.API_CRON_REPLICAS }}
          UI_REPLICAS: ${{ vars.UI_REPLICAS }}
          MAP_TILES_PATH: ${{ vars.MAP_TILES_PATH || '/var/lib/my-ads/maps' }}
          MAP_TILES_PORT: ${{ vars.MAP_TILES_PORT || '8235' }}
          OTEL_COLLECTOR_HTTP_PORT: ${{ vars.OTEL_COLLECTOR_HTTP_PORT || '6317' }}
          OTEL_COLLECTOR_GRPC_PORT: ${{ vars.OTEL_COLLECTOR_GRPC_PORT || '6318' }}
          TEMPO_PORT: ${{ vars.TEMPO_PORT || '6320' }}
          TEMPO_GRPC_PORT: ${{ vars.TEMPO_GRPC_PORT || '6321' }}
          PROMETHEUS_PORT: ${{ vars.PROMETHEUS_PORT || '6322' }}
          GRAFANA_PORT: ${{ vars.GRAFANA_PORT || '6323' }}
          LOKI_PORT: ${{ vars.LOKI_PORT || '6319' }}
        run: docker stack deploy -c docker-compose-prod.yml "$STACK_NAME" --resolve-image never

      - name: Wait for PostgreSQL to be ready
        env:
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
        run: |
          for i in $(seq 1 60); do
            docker run --rm --network "${STACK_NAME}_app_net" -e PGPASSWORD="${POSTGRES_PASSWORD}" postgres:16-alpine pg_isready -h postgres -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" 2>/dev/null && break
            echo "Waiting for PostgreSQL... ($i/60)"
            sleep 2
          done

      - name: Apply database migrations (production)
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          docker run --rm --network "${STACK_NAME}_app_net" \
            -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public" \
            -e DATABASE_DIRECT_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public" \
            -v "$(pwd)/server/prisma:/app/prisma" \
            -w /app \
            node:22-alpine sh -c "npm install prisma@6 && npx prisma migrate deploy"

      - name: Force update api/cron/bot/ui services
        run: |
          docker service update --force "${STACK_NAME}_api"
          docker service update --force "${STACK_NAME}_api-cron"
          docker service update --force "${STACK_NAME}_telegram-bot"
          docker service update --force "${STACK_NAME}_ui"
